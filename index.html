<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Registration System</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>

  <body class="bg-gradient-to-r from-blue-100 to-indigo-200 min-h-screen">
    <header class="bg-indigo-600 text-white p-5 shadow-lg">
      <div class="max-w-6xl mx-auto text-center">
        <h1 class="text-3xl md:text-4xl font-bold">
          Student Registration System
        </h1>
        <p class="text-sm md:text-lg mt-2">
          Register students, manage records, edit & delete easily
        </p>
      </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-8">
      <section class="bg-white rounded-2xl shadow-lg p-6 mb-8">
        <h2 class="text-xl md:text-2xl font-semibold mb-4 text-indigo-600">
          Register Student
        </h2>

        <form id="studentForm" class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input
            type="text"
            id="name"
            placeholder="Student Name"
            class="border p-3 rounded-lg focus:ring-2 focus:ring-indigo-400"/>

          <input
            type="text"
            id="studentId"
            placeholder="Student ID"
            class="border p-3 rounded-lg focus:ring-2 focus:ring-indigo-400"/>

          <input
            type="email"
            id="email"
            placeholder="Email ID"
            class="border p-3 rounded-lg focus:ring-2 focus:ring-indigo-400"/>

          <input
            type="text"
            id="contact"
            placeholder="Contact Number"
            class="border p-3 rounded-lg focus:ring-2 focus:ring-indigo-400"/>

          <div class="md:col-span-2">
            <button
              type="submit"
              class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 transition">
              Add Student
            </button>
          </div>
        </form>
      </section>

      <section class="bg-white rounded-2xl shadow-lg p-6">
        <h2 class="text-xl md:text-2xl font-semibold mb-4 text-indigo-600">
          Student Records
        </h2>

        <div class="overflow-y-auto max-h-[400px]" id="tableContainer">
          <table class="w-full border-collapse">
            <thead class="bg-indigo-500 text-white sticky top-0">
              <tr>
                <th class="p-3">Name</th>
                <th class="p-3">ID</th>
                <th class="p-3">Email</th>
                <th class="p-3">Contact</th>
                <th class="p-3">Actions</th>
              </tr>
            </thead>

            <tbody id="studentTable" class="text-center bg-gray-50"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
